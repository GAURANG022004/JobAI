# ==========================================
# JobAI Backend Configuration
# ==========================================

server.port=8080

spring.application.name=JobAI Backend

# ------------------------------------------
# Logging Configuration
# ------------------------------------------
logging.level.root=INFO
logging.level.com.jobai=INFO

logging.charset.console=UTF-8
logging.charset.file=UTF-8

# ------------------------------------------
# Future Configurable Storage Paths
# Values will be bound to @ConfigurationProperties
# ------------------------------------------
jobai.storage.knowledge-path=./storage/knowledge
jobai.storage.generated-path=./storage/generated
jobai.storage.templates-path=./storage/templates
jobai.storage.logs-path=./storage/logs

spring.profiles.active=dev